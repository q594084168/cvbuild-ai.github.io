<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Terms of Service | CVBuild-AI</title><style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,'Times New Roman',serif;background:#FFFDF8;color:#1A1A1A;line-height:1.7;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:700;letter-spacing:-0.01em}
  .container{max-width:720px;margin:0 auto;padding:0 24px}
  header{background:#FFFDF8;border-bottom:1px solid #E8E4D8;position:sticky;top:0;z-index:10}
  header .inner{max-width:1100px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
  header .logo{font-family:-apple-system,sans-serif;font-size:17px;font-weight:700;text-decoration:none;color:#1A1A1A;display:flex;align-items:center;gap:8px}
  header .logo span{color:#7C3AED}
  header nav{display:flex;gap:24px}
  header nav a{font-family:-apple-system,sans-serif;font-size:13px;color:#6B6B6B;text-decoration:none;font-weight:500;transition:color .15s}
  header nav a:hover{color:#7C3AED}
  .hero{padding:80px 0 60px;text-align:center;border-bottom:1px solid #E8E4D8}
  .hero h1{font-size:38px;line-height:1.2;margin-bottom:12px}
  .hero p{font-size:16px;color:#5C5C5C;max-width:500px;margin:0 auto 32px}
  .input-area{max-width:560px;margin:0 auto 80px}
  textarea{width:100%;min-height:120px;padding:16px;font-family:Georgia,serif;font-size:15px;line-height:1.6;border:2px solid #E8E4D8;border-radius:4px;background:#FFFBEF;resize:vertical;transition:border-color .15s;outline:none;color:#1A1A1A}
  textarea:focus{border-color:#7C3AED}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;font-family:-apple-system,sans-serif;font-size:14px;font-weight:600;border:none;border-radius:4px;cursor:pointer;transition:all .15s;text-decoration:none}
  .btn-primary{background:#7C3AED;color:#fff}
  .btn-primary:hover{background:#6D28D9}
  .btn-ghost{background:transparent;color:#6B6B6B;border:1px solid #D4D0C8}
  .btn-ghost:hover{border-color:#7C3AED;color:#7C3AED}
  .result-box{background:#FFFBEF;border:2px solid #E8E4D8;border-radius:4px;padding:20px;margin-top:16px;display:none}
  .result-box.show{display:block}
  .result-box pre{font-family:Georgia,serif;font-size:14px;line-height:1.7;white-space:pre-wrap;color:#1A1A1A}
  .result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .result-header span{font-family:-apple-system,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#9C9C9C}
  .copy-btn{font-family:-apple-system,sans-serif;font-size:12px;color:#7C3AED;cursor:pointer;border:none;background:none;font-weight:600}
  .section{padding:60px 0;border-bottom:1px solid #E8E4D8}
  .section h2{font-size:22px;margin-bottom:24px}
  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag{padding:8px 16px;font-family:-apple-system,sans-serif;font-size:12px;font-weight:500;border:1px solid #D4D0C8;border-radius:4px;cursor:pointer;background:#fff;color:#5C5C5C;transition:all .15s}
  .tag:hover{border-color:#7C3AED;color:#7C3AED}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{padding:20px;border:1px solid #E8E4D8;border-radius:4px;transition:border-color .15s;text-decoration:none;color:inherit;display:block}
  .card:hover{border-color:#7C3AED}
  .card h3{font-size:15px;margin-bottom:4px}
  .card p{font-size:13px;color:#6B6B6B}
  .faq details{padding:16px 0;border-bottom:1px solid #E8E4D8}
  .faq summary{font-family:-apple-system,sans-serif;font-size:14px;font-weight:600;cursor:pointer;list-style:none}
  .faq summary::-webkit-details-marker{display:none}
  .faq p{font-size:14px;color:#5C5C5C;margin-top:8px;padding-left:0}
  .pro-tip{margin:40px 0;padding:20px;background:#F5F0FF;border-left:3px solid #7C3AED;border-radius:0 4px 4px 0}
  .pro-tip strong{color:#7C3AED}
  .pro-tip a{color:#7C3AED;font-weight:600}
  footer{border-top:1px solid #E8E4D8;padding:32px 0;text-align:center}
  footer,footer a{font-family:-apple-system,sans-serif;font-size:12px;color:#9C9C9C;text-decoration:none}
  footer a:hover{color:#7C3AED}
  .status{font-family:-apple-system,sans-serif;font-size:12px;color:#9C9C9C;margin-top:8px;text-align:center;min-height:18px}
